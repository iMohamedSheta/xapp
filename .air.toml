root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
cmd = "if (Test-Path tmp/main.exe) { Remove-Item tmp/main.exe -Force }; go build -tags=dev -o tmp/main.exe ./cmd/server/main.go"
bin = "tmp/main.exe"
delay = 1000
poll = true
poll_interval = 500
exclude_dir = [
  "assets",
  "tmp",
  "vendor",
  "testdata",
  "tests",
  "node_modules",
  "public",
  "resources",
  "storage",
]
exclude_file = []
exclude_regex = ["_test.go"]
exclude_unchanged = false
follow_symlink = false
full_bin = ""
include_dir = []
include_ext = ["go", "tpl", "tmpl", "html"]
include_file = []
kill_delay = "0s"
log = "build-errors.log"
post_cmd = []
pre_cmd = []
rerun = false
rerun_delay = 500
send_interrupt = false
stop_on_error = false
entrypoint = ["tmp\\main.exe"]

[build.linux]
args_bin = []
cmd = "go build -tags=dev -o ./tmp/main ./cmd/server/main.go"
bin = "./tmp/main"
delay = 1000
poll = true
poll_interval = 500
exclude_dir = [
  "assets",
  "tmp",
  "vendor",
  "testdata",
  "tests",
  "node_modules",
  "public",
  "resources",
  "storage",
]
exclude_file = []
exclude_regex = ["_test.go"]
exclude_unchanged = false
follow_symlink = false
full_bin = ""
include_dir = []
include_ext = ["go", "tpl", "tmpl", "html"]
include_file = []
kill_delay = "0s"
log = "build-errors.log"
post_cmd = []
pre_cmd = []
rerun = false
rerun_delay = 500
send_interrupt = false
stop_on_error = false


[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
main_only = false
silent = false
time = false

[misc]
clean_on_exit = false

[proxy]
app_port = 0
enabled = false
proxy_port = 0

[screen]
clear_on_rebuild = false
keep_scroll = true
